services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: blocksec-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - BLOCKSEC_DB_PATH=/app/data/blocksec.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: blocksec-frontend
    ports:
      - "8888:80"
    depends_on:
      - backend
